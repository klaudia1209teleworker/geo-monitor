const CustomTooltip = ({ active, payload, label }) => {

  return (

/* ── Network Diagram ── */
const NetworkDiagram = ({ filter }) => {
  const [hovered, setHovered] = useState(null);
  const nodeMap = {};
  [...networkNodes.paa, ...networkNodes.urlNodes].forEach(n => nodeMap[n.id]=n);

  return (
    <svg viewBox="0 0 720 340" style={{ width:"100%", maxHeight:320, display:"block" }}>
      <defs>
        <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#C8C8DA"/>
        </marker>
      </defs>
      {networkNodes.edges.map((e,i) => {
        const f = nodeMap[e.from]; const t = nodeMap[e.to];
        const isOn = t.onsite;
        const visible = filter==="all" || (filter==="onsite"&&isOn) || (filter==="offsite"&&!isOn);
        return (
          <line key={i}
            x1={f.x+138} y1={f.y+14}
            x2={t.x-t.r} y2={t.y}
            stroke={isOn?CI.primary:CI.secondary}
            strokeWidth={e.w}
            strokeOpacity={visible?0.45:0.05}
            strokeDasharray={isOn?"none":"5 3"}
            markerEnd="url(#arr)"
          />
        );
      })}
      {networkNodes.paa.map(n => (
        <g key={n.id} style={{ cursor:"pointer" }}
          onMouseEnter={() => setHovered(n.id)}
          onMouseLeave={() => setHovered(null)}
        >
          <rect x={n.x} y={n.y} width={136} height={28} rx={6}
            fill={n.zeroSOV?"#FFF0F0":hovered===n.id?"#ECEDF7":"#F4F4F8"}
            stroke={n.zeroSOV?CI.highlight:hovered===n.id?CI.primary:CI.border}
            strokeWidth={n.zeroSOV||hovered===n.id?1.5:1}
          />
          <text x={n.x+68} y={n.y+18} textAnchor="middle" fontSize="11" fill={n.zeroSOV?CI.red:CI.text} fontFamily="DM Sans" fontWeight={n.zeroSOV?"600":"400"}>
            {n.label}
          </text>
          {n.zeroSOV && <circle cx={n.x+130} cy={n.y+4} r={4} fill={CI.highlight}/>}
        </g>
      ))}
      {networkNodes.urlNodes.map(n => {
        const visible = filter==="all" || (filter==="onsite"&&n.onsite) || (filter==="offsite"&&!n.onsite);
        return (
          <g key={n.id} style={{ cursor:"pointer" }}
            onMouseEnter={() => setHovered(n.id)}
            onMouseLeave={() => setHovered(null)}
          >
            <circle cx={n.x} cy={n.y} r={n.r}
              fill={n.onsite?`${CI.primary}20`:"white"}
              stroke={n.onsite?CI.primary:CI.secondary}
              strokeWidth={hovered===n.id?2.5:1.5}
              strokeDasharray={n.onsite?"none":"4 2"}
              opacity={visible?1:0.15}
            />
            <text x={n.x} y={n.y+5} textAnchor="middle" fontSize="13" fontWeight="700" fill={n.onsite?CI.primary:CI.secondary} fontFamily="DM Sans">{n.count}</text>
            <text x={n.x} y={n.y+n.r+14} textAnchor="middle" fontSize="9.5" fill={CI.muted} fontFamily="DM Sans">{n.label}</text>
          </g>
        );
      })}
      <g transform="translate(10,325)">
        <rect x={0} y={-10} width={12} height={12} rx={2} fill="#F4F4F8" stroke={CI.border} strokeWidth={1}/><text x={16} y={0} fontSize="10" fill={CI.muted} fontFamily="DM Sans">PAA 問題</text>
        <rect x={0} y={-10} width={12} height={12} rx={2} fill="#FFF0F0" stroke={CI.highlight} strokeWidth={1.5} transform="translate(90,0)"/><text x={106} y={0} fontSize="10" fill={CI.muted} fontFamily="DM Sans">Zero SOV</text>
        <circle cx={196} cy={-4} r={6} fill={`${CI.primary}20`} stroke={CI.primary} strokeWidth={1.5}/><text x={206} y={0} fontSize="10" fill={CI.muted} fontFamily="DM Sans">站內 URL（實心）</text>
        <circle cx={306} cy={-4} r={6} fill="white" stroke={CI.secondary} strokeWidth={1.5} strokeDasharray="3 1.5"/><text x={316} y={0} fontSize="10" fill={CI.muted} fontFamily="DM Sans">站外 URL（數字=關聯問題數）</text>
      </g>
    </svg>
  );
};

/* ── URL Table ── */
const UrlTable = ({ data, isOnsite }) => (
  <div>
    <div style={{ display:"grid", gridTemplateColumns:"26px 1fr 60px 48px 48px", gap:6, padding:"5px 10px", marginBottom:3, borderBottom:`1px solid ${CI.border}` }}>
      {["#","URL","引用數","變化","問題數"].map(h => <span key={h} style={{ fontSize:10.5, fontWeight:700, color:CI.mutedLight }}>{h}</span>)}
    </div>
    {data.map((row) => (
      <div key={row.rank} className="table-row" style={{ gridTemplateColumns:"26px 1fr 60px 48px 48px", gap:6 }}>
        <span style={{ fontSize:11, fontWeight:700, color:CI.mutedLight }}>{row.rank}</span>
        <span style={{ fontSize:11, color:CI.text, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{row.url}</span>
        <span style={{ fontSize:13, fontWeight:700, color:isOnsite?CI.primary:CI.secondary, textAlign:"right" }}>{row.citations}</span>
        <span style={{ fontSize:11.5, fontWeight:600, textAlign:"center", color:row.change>0?CI.green:row.change<0?CI.red:CI.muted }}>
          {row.change>0?`↑${row.change}`:row.change<0?`↓${Math.abs(row.change)}`:"—"}
        </span>
        <span style={{ fontSize:12, color:CI.muted, textAlign:"center" }}>{row.topics}</span>

const ProjectSwitcher = ({ projects, current, onSwitch }) => {
  const [open, setOpen] = useState(false);
  const cur = projects.find(p=>p.id===current);
  return (
    <div style={{ position:"relative" }}>
      <div onClick={() => setOpen(!open)} style={{ padding:"10px 13px", borderRadius:12, border:`1.5px solid ${CI.border}`, background:CI.bg, cursor:"pointer", display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
        <div>
          <div style={{ fontSize:12.5, fontWeight:700, color:CI.text }}>{cur.name}</div>
          <div style={{ fontSize:10.5, color:CI.muted, marginTop:1 }}>{cur.domain} · {cur.locale} · {cur.freq}</div>
        </div>
        <span style={{ color:CI.muted, fontSize:11, transform:open?"rotate(180deg)":"none", transition:"transform 0.2s" }}>▾</span>
      </div>
      {open && (
        <div style={{ position:"absolute", top:"calc(100% + 5px)", left:0, right:0, background:CI.bg, border:`1.5px solid ${CI.border}`, borderRadius:12, zIndex:200, overflow:"hidden", boxShadow:"0 8px 24px rgba(0,0,0,0.08)" }}>
          {projects.map(p => (
            <div key={p.id} onClick={() => { onSwitch(p.id); setOpen(false); }}
              style={{ padding:"10px 13px", cursor:"pointer", background:p.id===current?`${CI.primary}08`:"white", borderBottom:p.id<projects.length?`1px solid ${CI.border}`:"none" }}>
              <div style={{ fontSize:12.5, fontWeight:p.id===current?700:500, color:p.id===current?CI.primary:CI.text }}>{p.name}</div>
              <div style={{ fontSize:10.5, color:CI.muted, marginTop:1 }}>{p.domain} · {p.locale}</div>

          <div style={{ padding:"9px 13px", display:"flex", alignItems:"center", gap:6, cursor:"pointer", borderTop:`1px solid ${CI.border}` }}>
            <span style={{ fontSize:16, color:CI.primary, lineHeight:1 }}>＋</span>
            <span style={{ fontSize:12.5, color:CI.primary, fontWeight:600 }}>新增專案</span>
          </div>
        </div>
      )}
    </div>
  );
};

      )}
      {stab==="project" && (
        <div className="card" style={{ maxWidth:540 }}>
          <SectionTitle>專案設定</SectionTitle>
          {[{l:"品牌名稱",v:"Teleworker"},{l:"監控網域",v:"teleworker.io"},{l:"語系",v:"zh-TW"}].map((r,i)=>(
            <div key={i} style={{ marginBottom:14 }}><label style={{ fontSize:11.5, color:CI.muted, fontWeight:600, display:"block", marginBottom:5 }}>{r.l}</label><input defaultValue={r.v} style={inpStyle}/></div>
          ))}
          <div style={{ marginBottom:14 }}><label style={{ fontSize:11.5, color:CI.muted, fontWeight:600, display:"block", marginBottom:5 }}>更新頻率</label>
            <select defaultValue="weekly" style={inpStyle}><option value="weekly">每週（週一 04:00）</option><option value="monthly">每月（1 日 04:00）</option></select>
          </div>
          {[{l:"月預算上限（每引擎）",v:"$80 USD"},{l:"週預算上限（每引擎）",v:"$25 USD"}].map((r,i)=>(
            <div key={i} style={{ marginBottom:14 }}><label style={{ fontSize:11.5, color:CI.muted, fontWeight:600, display:"block", marginBottom:5 }}>{r.l}</label><input defaultValue={r.v} style={inpStyle}/></div>
          ))}
          <button style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background:CI.primary, color:"white", fontWeight:700, fontSize:14 }}>儲存設定</button>
        </div>
      )}
    </div>
  );
};

/* ════ MAIN APP ════ */
function GEOApp() {
  const [tab, setTab] = useState("overview");
  const [subTab, setSubTab] = useState("seed");
  const [project, setProject] = useState(1);
  const [exploOpen, setExploOpen] = useState(false);

  const navItems = [
    { id:"overview",    label:"總覽",    icon:"◈" },
    { id:"exploration", label:"主題探索", icon:"⬡", sub:[{id:"seed",label:"種子探索",desc:"Nav Crawler"},{id:"prompt",label:"Prompt 探索",desc:"PAA Crawler"}] },
    { id:"engines",     label:"引擎分析", icon:"◑" },
    { id:"queries",     label:"查詢監控", icon:"◷" },
    { id:"competitor",  label:"競品對比", icon:"⊕" },
    { id:"settings",    label:"設定",    icon:"◌" },
  ];

  const pageMeta = {
    overview:   { title:"總覽",          crumb:"總覽" },
    seed:       { title:"種子探索",       crumb:"主題探索 / 種子探索" },
    prompt:     { title:"Prompt 探索",    crumb:"主題探索 / Prompt 探索" },
    engines:    { title:"引擎分析",       crumb:"引擎分析" },
    queries:    { title:"查詢監控",       crumb:"查詢監控" },
    competitor: { title:"競品對比",       crumb:"競品對比" },
    settings:   { title:"設定",           crumb:"設定" },
  };

  const activeKey = tab === "exploration" ? subTab : tab;
  const meta = pageMeta[activeKey] || { title: activeKey, crumb: activeKey };

  const renderContent = () => {
    if (tab==="overview")    return <OverviewTab/>;
    if (tab==="exploration") return subTab==="seed" ? <SeedCrawlerTab/> : <PromptCrawlerTab/>;
    if (tab==="engines")     return <EngineTab/>;
    if (tab==="queries")     return <QueryTab/>;
    if (tab==="competitor")  return <CompetitorTab/>;
    if (tab==="settings")    return <SettingsTab/>;
  };

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:"#F2F2F6" }}>
      {/* ── Sidebar ── */}
      <div style={{ position:"fixed", left:0, top:0, bottom:0, width:228, background:CI.bg, borderRight:`1.5px solid ${CI.border}`, display:"flex", flexDirection:"column", zIndex:100, overflowY:"auto" }}>
        {/* Logo */}
        <div style={{ padding:"20px 20px 16px", borderBottom:`1px solid ${CI.border}` }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:2.5, color:CI.mutedLight, marginBottom:3 }}>TELEWORKER</div>
          <div style={{ fontSize:22, fontWeight:800, color:CI.primary, fontFamily:"'Syne',sans-serif" }}>GEO Monitor</div>
          <div style={{ marginTop:9, display:"inline-flex", alignItems:"center", gap:5, background:`${CI.button}35`, borderRadius:20, padding:"3px 10px", fontSize:10.5, fontWeight:600, color:CI.green }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:CI.green, animation:"pulse 2s infinite", display:"inline-block" }}/>
            即時監控中
          </div>
        </div>
        {/* Project switcher */}
        <div style={{ padding:"12px 14px", borderBottom:`1px solid ${CI.border}` }}>
          <div style={{ fontSize:10, fontWeight:700, color:CI.mutedLight, letterSpacing:1.5, marginBottom:6 }}>當前專案</div>
          <ProjectSwitcher projects={projects} current={project} onSwitch={setProject}/>
        </div>
        {/* Nav */}
        <nav style={{ padding:"10px 10px", flex:1 }}>
          {navItems.map(item => (
            <div key={item.id}>
              <button className={`nav-item${tab===item.id?" active":""}`}
                onClick={() => {
                  setTab(item.id);
                  if (item.sub) setExploOpen(!exploOpen || tab!==item.id);
                  else setExploOpen(false);
                }}>
                <span style={{ fontSize:15, opacity:0.75, width:16, textAlign:"center" }}>{item.icon}</span>
                {item.label}
                {item.sub && <span style={{ marginLeft:"auto", fontSize:10, color:CI.mutedLight }}>{tab===item.id&&exploOpen?"▴":"▾"}</span>}
              </button>
              {item.sub && tab===item.id && exploOpen && (
                <div style={{ marginBottom:4 }}>
                  {item.sub.map(s => (
                    <button key={s.id} className={`nav-item nav-sub${subTab===s.id&&tab==="exploration"?" active":""}`}
                      onClick={() => setSubTab(s.id)}>
                      <span style={{ fontSize:10, opacity:0.5, width:14 }}>└</span>
                      <div>
                        <div style={{ fontSize:12.5 }}>{s.label}</div>
                        <div style={{ fontSize:10.5, color:CI.mutedLight, fontWeight:400 }}>{s.desc}</div>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </nav>
        {/* Sidebar footer */}
        <div style={{ padding:"12px 16px", borderTop:`1px solid ${CI.border}` }}>
          <div style={{ background:"#F0F0F5", borderRadius:7, padding:"4px 9px", fontSize:10, color:CI.muted, textAlign:"center" }}>更新週期：每 6 小時</div>
          <div style={{ marginTop:6, fontSize:10, color:CI.mutedLight, textAlign:"center" }}>GEO Monitor v2.0 · Teleworker</div>
        </div>
      </div>

      {/* ── Main ── */}
      <div style={{ marginLeft:228, flex:1, padding:"24px 30px", minWidth:0 }}>
        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
          <div>
            <div style={{ fontSize:10.5, color:CI.mutedLight, marginBottom:4 }}>{meta.crumb}</div>
            <h1 style={{ fontSize:24, fontWeight:800, color:CI.text, fontFamily:"'Syne',sans-serif", margin:0 }}>{meta.title}</h1>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <select style={{ padding:"7px 13px", borderRadius:10, border:`1.5px solid ${CI.border}`, background:CI.bg, color:CI.text, fontSize:13, cursor:"pointer" }}>
              <option>過去 30 天</option><option>過去 90 天</option><option>自訂區間</option>
            </select>
            <button style={{ padding:"7px 16px", borderRadius:10, border:"none", background:CI.primary, color:"white", fontWeight:600, fontSize:13, cursor:"pointer" }}>↓ 匯出報告</button>
          </div>
        </div>

        {renderContent()}

        <div style={{ marginTop:24, padding:"14px 0", borderTop:`1px solid ${CI.border}`, display:"flex", justifyContent:"space-between", fontSize:11.5, color:CI.mutedLight }}>
          <span>GEO Monitor v2.0 · Teleworker Internal Tool</span>
          <span>資料來源：ChatGPT / Gemini / Perplexity / Claude / Copilot · 最後更新：今日 06:00</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GEOApp/>);
</script>
</body>
</html>
