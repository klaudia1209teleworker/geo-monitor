/* ══════════════════════════════════════════
   D3 Network Diagram Component
══════════════════════════════════════════ */
const NetworkDiagram = ({ urlFilter, gapFilter, onGapToggle, subtopicFilter }) => {
  const svgRef = useRef(null);
  const simRef  = useRef(null);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;

    // Clear previous render
    d3.select(el).selectAll("*").remove();

    const W = el.clientWidth  || 700;
    const H = el.clientHeight || 340;

    const svg = d3.select(el)
      .attr("viewBox", `0 0 ${W} ${H}`)
      .style("overflow","hidden");

    // Zoom
    const gRoot = svg.append("g");
    const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", e => gRoot.attr("transform", e.transform));
    svg.call(zoom);

    // Arrow marker
    svg.append("defs").append("marker")
      .attr("id","net-arr").attr("markerWidth",6).attr("markerHeight",6)
      .attr("refX",5).attr("refY",3).attr("orient","auto")
      .append("path").attr("d","M0,0 L0,6 L6,3 z").attr("fill","#C8C8DA");

    // Build node/link arrays (deep clone for D3 mutation)
    const allNodes = [
      ...networkData.paa.map(p => ({ ...p, nodeType:"paa" })),
      ...networkData.urls.map(u => ({ ...u, nodeType:"url" })),
    ];
    const nm = {};
    allNodes.forEach(n => nm[n.id] = n);
    const linkData = networkData.links
      .map(l => ({ source: nm[l.source], target: nm[l.target] }))
      .filter(l => l.source && l.target);

    const maxCount = d3.max(networkData.urls, d => d.count) || 1;
    const rScale = d3.scaleSqrt().domain([0, maxCount]).range([14, 44]);
    const fScale = d3.scaleSqrt().domain([0, maxCount]).range([8, 14]);

    // Force simulation
    const sim = d3.forceSimulation(allNodes)
      .force("link",      d3.forceLink(linkData).id(d => d.id).distance(130).strength(0.3))
      .force("charge",    d3.forceManyBody().strength(d => d.nodeType==="url" ? -450 : -55))
      .force("center",    d3.forceCenter(W/2, H/2))
      .force("collision", d3.forceCollide().radius(d => d.nodeType==="url" ? rScale(d.count||0)+10 : 20))
      .force("x",         d3.forceX(W/2).strength(0.02))
      .force("y",         d3.forceY(H/2).strength(0.02));

    simRef.current = sim;

    // Drag
    function mkDrag(s) {
      return d3.drag()
        .on("start",(e,d) => { if(!e.active) s.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; d._dr=false; })
        .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; d._dr=true; })
        .on("end",  (e,d) => { if(!e.active) s.alphaTarget(0); d.fx=null; d.fy=null; });
    }

    // Links
    const linkEl = gRoot.append("g").selectAll("line").data(linkData).join("line")
      .attr("class","net-link")
      .attr("marker-end","url(#net-arr)");

    // PAA nodes
    const PAA_W = 80, PAA_H = 26;
    let pinnedNode = null;

    const tooltip = document.getElementById("net-tooltip");

    function showTip(e, d) {
      if (!tooltip) return;
      tooltip.style.display = "block";
      if (d.nodeType === "paa") {
        const gapTags = [];
        if (d.zeroSOV)  gapTags.push(`<span style="background:#fff0f0;color:#F88888;border:1px solid #f8cccc;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700">Zero SOV</span>`);
        if (d.noDomain) gapTags.push(`<span style="background:#f0f0fb;color:#6768A6;border:1px solid #d0d6f5;border-radius:3px;padding:1px 6px;font-size:9px;font-weight:700">No Domain Citation</span>`);
        const gapHtml = gapTags.length ? `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap">${gapTags.join("")}</div>` : "";
        tooltip.innerHTML = `<div style="font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${ST_COLOR[d.subtopic]||"#aaa"};margin-bottom:3px">${d.subtopic}</div><div style="color:#464653;font-weight:500">${d.text}</div>${gapHtml}`;
      } else {
        const typeMap = { micron:"🔵 官網",  "zh-media":"📰 中文媒體", "zh-social":"💬 中文社群", external:"🌐 外部來源" };
        const typeLabel = typeMap[d.type] || "🌐 外部來源";
        tooltip.innerHTML = `<div style="font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9999aa;margin-bottom:3px">${typeLabel}</div><div style="color:#464653;word-break:break-all">${d.url}</div><div style="margin-top:5px;font-size:11px;font-weight:700;color:#6768A6">關聯問題數：${d.count}</div><div style="margin-top:3px;font-size:9px;color:#8FF4D2;background:#6768A6;padding:2px 7px;border-radius:3px;display:inline-block">👆 點擊開啟</div>`;
      }
    }
    function mvTip(e) { if(tooltip){ tooltip.style.left=(e.clientX+14)+"px"; tooltip.style.top=(e.clientY-14)+"px"; } }
    function hideTip() { if(tooltip) tooltip.style.display="none"; }

    function hlNode(d, on) {
      linkEl
        .classed("hi",  l => on && (l.source.id===d.id || l.target.id===d.id))
        .classed("dim", l => on && !(l.source.id===d.id || l.target.id===d.id));
    }
    function togglePin(d) {
      if (pinnedNode === d.id) { pinnedNode = null; linkEl.classed("hi",false).classed("dim",false); }
      else { pinnedNode = d.id; hlNode(d, true); }
    }

    const paaG = gRoot.append("g").selectAll(".node-paa")
      .data(allNodes.filter(n => n.nodeType==="paa")).join("g")
      .attr("class", d => {
        let c = "node-paa";
        if (d.zeroSOV && d.noDomain) c += " both-gap";
        else if (d.zeroSOV)          c += " zero-sov";
        else if (d.noDomain)         c += " no-domain";
        return c;
      })
      .call(mkDrag(sim))
      .on("mouseover", (e,d) => { showTip(e,d); hlNode(d,true); })
      .on("mousemove", mvTip)
      .on("mouseout",  (e,d) => { hideTip(); if(pinnedNode!==d.id) hlNode(d,false); })
      .on("click",     (e,d) => { if(!d._dr) togglePin(d); d._dr=false; });

    paaG.append("rect")
      .attr("x", -PAA_W/2).attr("y", -PAA_H/2)
      .attr("width", PAA_W).attr("height", PAA_H).attr("rx", 4)
      .attr("fill",         d => ST_COLOR[d.subtopic] || CI.primary)
      .attr("fill-opacity", 0.85)
      .attr("stroke",       d => { try { const c=d3.color(ST_COLOR[d.subtopic]||CI.primary); return c?c.darker(0.4):"#888"; } catch(err){ return "#888"; } })
      .attr("stroke-width", 1.5);

    paaG.append("text")
      .text(d => { const t=d.text; return t.length>11 ? t.substring(0,11)+"…" : t; });

    // URL nodes
    const urlG = gRoot.append("g").selectAll(".node-url")
      .data(allNodes.filter(n => n.nodeType==="url")).join("g")
      .attr("class", d => `node-url ${d.type||"external"}`)
      .call(mkDrag(sim))
      .on("mouseover", (e,d) => { showTip(e,d); hlNode(d,true); })
      .on("mousemove", mvTip)
      .on("mouseout",  (e,d) => { hideTip(); if(pinnedNode!==d.id) hlNode(d,false); })
      .on("click",     (e,d) => { if(!d._dr){ window.open(d.url,"_blank","noopener,noreferrer"); } d._dr=false; });

    urlG.append("circle").attr("r", d => rScale(d.count||0));
    urlG.append("text").attr("class","cnt")
      .text(d => d.count||"")
      .attr("font-size", d => fScale(d.count||0)+"px");
    urlG.append("text").attr("class","lbl")
      .attr("dy", d => rScale(d.count||0)+12)
      .text(d => d.label.length>13 ? d.label.substring(0,13)+"…" : d.label);

    sim.on("tick", () => {
      linkEl
        .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      paaG.attr("transform", d => `translate(${d.x},${d.y})`);
      urlG.attr("transform", d => `translate(${d.x},${d.y})`);
    });

    return () => { sim.stop(); hideTip(); };
  }, []);

  // Apply URL filter via CSS opacity
  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    d3.select(el).selectAll(".node-url")
      .style("opacity", d => {
        if (urlFilter === "onsite")  return d.type==="micron" ? 1 : 0.08;
        if (urlFilter === "offsite") return d.type!=="micron" ? 1 : 0.08;
        return 1;
      });
    d3.select(el).selectAll(".net-link")
      .style("opacity", d => {
        const t = d.target.type;
        if (urlFilter === "onsite")  return t==="micron"  ? 0.7 : 0.04;
        if (urlFilter === "offsite") return t!=="micron"  ? 0.7 : 0.04;
        return 0.7;
      });
  }, [urlFilter]);

  // Gap filter
  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    d3.select(el).selectAll(".node-paa")
      .style("opacity", d => {
        if (!gapFilter) return 1;
        return (d.zeroSOV || d.noDomain) ? 1 : 0.06;
      });
  }, [gapFilter]);

  // Subtopic filter
  useEffect(() => {
    const el = svgRef.current;
    if (!el || !subtopicFilter) return;
    const active = new Set(subtopicFilter);
    d3.select(el).selectAll(".node-paa")
      .style("opacity", d => !gapFilter && active.size > 0 ? (active.has(d.subtopic) ? 1 : 0.05) : undefined);
    d3.select(el).selectAll(".net-link")
      .style("opacity", d => !gapFilter && active.size > 0 ? (active.has(d.source.subtopic) ? 0.6 : 0.03) : undefined);
  }, [subtopicFilter, gapFilter]);

  return (
    <svg ref={svgRef} style={{ width:"100%", height:330, display:"block", cursor:"grab" }}/>
  );
};

// Derive quadrant + action plan for a topic
function deriveActions(t) {
  const citHigh   = t.totalCitation >= 50;
  const sovHigh   = t.sov >= 45;
  const dasHigh   = t.das >= 25;
  const brandOk   = sovHigh && dasHigh;
  let quadrant, rules = [];

  if (citHigh && brandOk)      quadrant = "green_high";
  else if (citHigh && !brandOk) quadrant = "red_high";
  else if (!citHigh && brandOk) quadrant = "green_low";
  else                           quadrant = "yellow_low";

  if (!citHigh)             rules.push("pr_heat");
  if (citHigh && !sovHigh)  rules.push("pr_brand");
  if (citHigh && !dasHigh)  rules.push("web_content");

  return { quadrant, rules };
}

            <div style={{ fontSize:26, fontWeight:800, color:CI.red, fontFamily:"'Syne',sans-serif", lineHeight:1, marginBottom:4 }}>
              {topic.zeroSOV}<span style={{ fontSize:13, color:CI.muted }}> / {topic.prompts}</span>

            <MiniBar val={topic.zeroSOV} max={topic.prompts} color={CI.red}/>

        <div style={{ flex:1, height:1, background:CI.border }}/>
      </div>

      {/* ─── Quadrant position ─────────────────────────── */}

          <div style={{ fontSize:10, fontWeight:700, color:CI.mutedLight, letterSpacing:.08, textTransform:"uppercase", marginBottom:8 }}>競爭態勢矩陣</div>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:4 }}>
            {MATRIX_CELLS.map((cell,i) => {
              const isActive =
                (quadrant==="red_high"   && cell.row==="high" && cell.col==="low")  ||
                (quadrant==="green_high" && cell.row==="high" && cell.col==="high") ||
                (quadrant==="yellow_low" && cell.row==="low"  && cell.col==="low")  ||
                (quadrant==="green_low"  && cell.row==="low"  && cell.col==="high");
              return (
                <div key={i} style={{
                  height:60, borderRadius:8, padding:"7px 9px",
                  background:isActive?cell.bg:"#F0F0F5",
                  border:`2px solid ${isActive?cell.border:CI.border}`,
                  display:"flex", flexDirection:"column", justifyContent:"space-between",
                }}>
                  <div style={{ fontSize:9, fontWeight:700, color:isActive?cell.titleColor:CI.mutedLight, lineHeight:1.3 }}>{cell.icon} {cell.title}</div>
                  {isActive && <div style={{ fontSize:8, color:cell.titleColor, fontWeight:700 }}>◀ 目前位置</div>}
                </div>
              );
            })}
          </div>
          <div style={{ marginTop:6, fontSize:9.5, color:CI.muted, lineHeight:1.5 }}>
            <span style={{ color:CI.text, fontWeight:600 }}>縱：</span>Total Citation<br/>
            <span style={{ color:CI.text, fontWeight:600 }}>橫：</span>SOV ＋ DAS
          </div>
        </div>

        {/* Quadrant detail card */}
        <div style={{ background:qMeta.bg, border:`2px solid ${qMeta.border}`, borderRadius:14, padding:"18px 22px" }}>
          <div style={{ fontSize:16, fontWeight:800, color:qMeta.color, fontFamily:"'Syne',sans-serif", marginBottom:6 }}>
            {qMeta.icon} {qMeta.label}
          </div>
          <div style={{ fontSize:13, color:CI.muted, lineHeight:1.7 }}>

            {quadrant==="green_high" && `「${topic.label}」話題競爭激烈，且品牌能見度強（SOV ${topic.sov}%、DAS ${topic.das}%）。維持現有策略，持續監控競爭者動態。`}
            {quadrant==="yellow_low" && `「${topic.label}」話題尚未成熟（Total Citation = ${topic.totalCitation}），競爭者少。這是搶先佈局的機會，投入 PR 製造外部討論。`}
            {quadrant==="green_low"  && `「${topic.label}」話題尚在早期，品牌已建立優勢（SOV ${topic.sov}%、DAS ${topic.das}%）。鞏固引用份額，建立此話題的品牌權威。`}
          </div>
        </div>
      </div>

      {/* ─── Action rules ─────────────────────────── */}
      {rules.length === 0 ? (
        <div className="card" style={{ textAlign:"center", padding:"30px", color:CI.muted }}>
          <div style={{ fontSize:24, marginBottom:8 }}>✅</div>
          <div style={{ fontSize:14, fontWeight:700, color:CI.green }}>此話題目前表現良好，維持現有策略即可</div>
          <div style={{ fontSize:12.5, marginTop:6, color:CI.muted }}>持續監控 SOV 與 DAS 趨勢，確保領先優勢不流失。</div>
        </div>
      ) : (
        <div>
          <div style={{ fontSize:12.5, fontWeight:700, color:CI.text, marginBottom:12, display:"flex", alignItems:"center", gap:8 }}>
            <span style={{ background:topic.color, color:"white", borderRadius:20, padding:"2px 10px", fontSize:11 }}>
              {rules.length} 條行動建議
            </span>
            針對「{topic.label}」Topic
          </div>
          {rules.map((ruleId, ri) => {
            const r = RULE_META[ruleId];
            return (
              <div key={ri} className="card" style={{ marginBottom:10, borderLeft:`4px solid ${r.color}`, padding:"18px 22px" }}>
                <div style={{ display:"flex", alignItems:"flex-start", gap:14 }}>
                  {/* Rule number */}
                  <div style={{ width:32, height:32, borderRadius:9, background:r.bg, border:`2px solid ${r.color}40`, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                    <span style={{ fontSize:14, fontWeight:800, color:r.color }}>P{ri+1}</span>
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:14.5, fontWeight:700, color:CI.text, marginBottom:5, fontFamily:"'Syne',sans-serif" }}>{r.label}</div>
                    <div style={{ fontSize:12.5, color:CI.muted, lineHeight:1.7, marginBottom:12 }}>{r.desc}</div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                      <div style={{ background:`${r.color}08`, borderRadius:10, padding:"11px 14px", border:`1px solid ${r.color}20` }}>
                        <div style={{ fontSize:9.5, fontWeight:700, letterSpacing:.1, textTransform:"uppercase", color:r.color, marginBottom:8 }}>目標指標</div>
                        {r.targets.map((t, ti) => (
                          <div key={ti} style={{ display:"flex", alignItems:"center", gap:7, fontSize:12.5, fontWeight:600, color:CI.text, marginBottom:4 }}>
                            <span style={{ width:16, height:16, borderRadius:4, background:r.color, color:"white", fontSize:9, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>↑</span>
                            {t}
                          </div>
                        ))}
                      </div>
                      <div style={{ background:"#F8F8FC", borderRadius:10, padding:"11px 14px", border:`1px solid ${CI.border}` }}>
                        <div style={{ fontSize:9.5, fontWeight:700, letterSpacing:.1, textTransform:"uppercase", color:CI.mutedLight, marginBottom:8 }}>觀察指標</div>
                        {r.watch.map((w, wi) => (
                          <div key={wi} style={{ display:"flex", alignItems:"center", gap:7, fontSize:12.5, fontWeight:600, color:CI.text, marginBottom:4 }}>
                            <span style={{ width:16, height:16, borderRadius:4, background:CI.mutedLight, color:"white", fontSize:9, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>◎</span>
                            {w}
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

  const navItems = [
    { id:"overview",    label:"總覽",    icon:"◈" },
    { id:"exploration", label:"主題探索", icon:"⬡", sub:[{id:"seed",label:"種子探索",desc:"Nav Crawler"},{id:"prompt",label:"Prompt 探索",desc:"PAA Crawler"}] },
    { id:"engines",     label:"引擎分析", icon:"◑" },
    { id:"queries",     label:"查詢監控", icon:"◷" },
    { id:"competitor",  label:"競品對比", icon:"⊕" },
    { id:"actions",     label:"行動方案", icon:"◎" },
    { id:"settings",    label:"設定",    icon:"◌" },
  ];

  const pageMeta = {
    overview:   { title:"總覽",          crumb:"總覽" },
    seed:       { title:"種子探索",       crumb:"主題探索 / 種子探索" },
    prompt:     { title:"Prompt 探索",    crumb:"主題探索 / Prompt 探索" },
    engines:    { title:"引擎分析",       crumb:"引擎分析" },
    queries:    { title:"查詢監控",       crumb:"查詢監控" },
    competitor: { title:"競品對比",       crumb:"競品對比" },
    actions:    { title:"行動方案",        crumb:"行動方案" },
    settings:   { title:"設定",          crumb:"設定" },
  };

  const activeKey = tab === "exploration" ? subTab : tab;
  const meta = pageMeta[activeKey] || { title:activeKey, crumb:activeKey };

  const renderContent = () => {
    if (tab==="overview")    return <OverviewTab/>;
    if (tab==="exploration") return subTab==="seed" ? <SeedCrawlerTab/> : <PromptCrawlerTab/>;
    if (tab==="engines")     return <EngineTab/>;
    if (tab==="queries")     return <QueryTab/>;
    if (tab==="competitor")  return <CompetitorTab/>;
    if (tab==="actions")     return <ActionPlanTab/>;
    if (tab==="settings")    return <SettingsTab/>;
  };

  return (
    <div style={{ display:"flex", minHeight:"100vh", background:"#F2F2F6" }}>
      {/* ── Sidebar ── */}
      <div style={{ position:"fixed", left:0, top:0, bottom:0, width:228, background:CI.bg, borderRight:`1.5px solid ${CI.border}`, display:"flex", flexDirection:"column", zIndex:100, overflowY:"auto" }}>
        {/* Logo */}
        <div style={{ padding:"20px 20px 16px", borderBottom:`1px solid ${CI.border}` }}>
          <div style={{ fontSize:10, fontWeight:700, letterSpacing:2.5, color:CI.mutedLight, marginBottom:3 }}>TELEWORKER</div>
          <div style={{ fontSize:22, fontWeight:800, color:CI.primary, fontFamily:"'Syne',sans-serif" }}>GEO Monitor</div>
          <div style={{ marginTop:9, display:"inline-flex", alignItems:"center", gap:5, background:`${CI.button}35`, borderRadius:20, padding:"3px 10px", fontSize:10.5, fontWeight:600, color:CI.green }}>
            <span style={{ width:6, height:6, borderRadius:"50%", background:CI.green, animation:"pulse 2s infinite", display:"inline-block" }}/>
            即時監控中
          </div>
        </div>
        {/* Project switcher */}
        <div style={{ padding:"12px 14px", borderBottom:`1px solid ${CI.border}` }}>
          <div style={{ fontSize:10, fontWeight:700, color:CI.mutedLight, letterSpacing:1.5, marginBottom:6 }}>當前專案</div>
          <ProjectSwitcher projects={projects} current={project} onSwitch={setProject}/>
        </div>
        {/* Nav */}
        <nav style={{ padding:"10px 10px", flex:1 }}>
          {navItems.map(item => (
            <div key={item.id}>
              <button className={`nav-item${tab===item.id?" active":""}`}
                onClick={() => {
                  setTab(item.id);
                  if (item.sub) setExploOpen(!exploOpen || tab!==item.id);
                  else setExploOpen(false);
                }}>
                <span style={{ fontSize:15, opacity:0.75, width:16, textAlign:"center" }}>{item.icon}</span>
                {item.label}
                {item.sub && <span style={{ marginLeft:"auto", fontSize:10, color:CI.mutedLight }}>{tab===item.id&&exploOpen?"▴":"▾"}</span>}
              </button>
              {item.sub && tab===item.id && exploOpen && (
                <div style={{ marginBottom:4 }}>
                  {item.sub.map(s => (
                    <button key={s.id} className={`nav-item nav-sub${subTab===s.id&&tab==="exploration"?" active":""}`}
                      onClick={() => setSubTab(s.id)}>
                      <span style={{ fontSize:10, opacity:0.5, width:14 }}>└</span>
                      <div>
                        <div style={{ fontSize:12.5 }}>{s.label}</div>
                        <div style={{ fontSize:10.5, color:CI.mutedLight, fontWeight:400 }}>{s.desc}</div>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </div>
          ))}
        </nav>
        {/* Sidebar footer */}
        <div style={{ padding:"12px 16px", borderTop:`1px solid ${CI.border}` }}>
          <div style={{ background:"#F0F0F5", borderRadius:7, padding:"4px 9px", fontSize:10, color:CI.muted, textAlign:"center" }}>更新週期：每 6 小時</div>
          <div style={{ marginTop:6, fontSize:10, color:CI.mutedLight, textAlign:"center" }}>GEO Monitor v2.1 · Teleworker</div>
        </div>
      </div>

      {/* ── Main ── */}
      <div style={{ marginLeft:228, flex:1, padding:"24px 30px", minWidth:0 }}>
        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:22 }}>
          <div>
            <div style={{ fontSize:10.5, color:CI.mutedLight, marginBottom:4 }}>{meta.crumb}</div>
            <h1 style={{ fontSize:24, fontWeight:800, color:CI.text, fontFamily:"'Syne',sans-serif", margin:0 }}>{meta.title}</h1>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <select style={{ padding:"7px 13px", borderRadius:10, border:`1.5px solid ${CI.border}`, background:CI.bg, color:CI.text, fontSize:13, cursor:"pointer" }}>
              <option>過去 30 天</option><option>過去 90 天</option><option>自訂區間</option>
            </select>
            <button style={{ padding:"7px 16px", borderRadius:10, border:"none", background:CI.primary, color:"white", fontWeight:600, fontSize:13, cursor:"pointer" }}>↓ 匯出報告</button>
          </div>
        </div>

        {renderContent()}

        <div style={{ marginTop:24, padding:"14px 0", borderTop:`1px solid ${CI.border}`, display:"flex", justifyContent:"space-between", fontSize:11.5, color:CI.mutedLight }}>
          <span>GEO Monitor v2.1 · Teleworker Internal Tool</span>
          <span>資料來源：ChatGPT / Gemini / Perplexity / Claude / AI Overview PAA · 最後更新：今日 06:00</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GEOApp/>);
</script>
</body>
</html>
